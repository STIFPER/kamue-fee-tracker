<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#3A2C28">
<title>ค่ามือ · Smart Compensation Platform for Medical Assistants</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon.svg">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="liquid-bg-container">
  <div class="liquid-blob blob-1"></div>
  <div class="liquid-blob blob-2"></div>
  <div class="liquid-blob blob-3"></div>
  <div class="liquid-blob blob-4"></div>
</div>

<div id="onboarding" class="onboarding hidden" style="width:100%;">
  <div class="onboarding-card">
    <div class="brand-kicker">Smart Compensation Platform for Medical Assistants</div>
    <h1 class="onboarding-title">Welcome Back</h1>
    <p class="onboarding-lead">Sign in with Google to securely sync your daily cases and track earnings on the clinic cloud.</p>
    <button id="btn-google-login" class="btn btn-primary btn-block btn-google">
      <svg width="18" height="18" viewBox="0 0 18 18" style="margin-right:8px;vertical-align:-3px"><path fill="#fff" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.9c1.7-1.57 2.7-3.88 2.7-6.62Z"/><path fill="#fff" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.9-2.26c-.8.54-1.84.86-3.06.86-2.35 0-4.34-1.59-5.05-3.72H.98v2.33A9 9 0 0 0 9 18Z"/><path fill="#fff" d="M3.95 10.7A5.4 5.4 0 0 1 3.67 9c0-.59.1-1.17.28-1.7V4.97H.98A9 9 0 0 0 0 9c0 1.45.35 2.83.98 4.03l2.97-2.33Z"/><path fill="#fff" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.46.9 11.42 0 9 0A9 9 0 0 0 .98 4.97L3.95 7.3C4.66 5.17 6.65 3.58 9 3.58Z"/></svg>
      Continue with Google
    </button>
    <div id="onboarding-switch"></div>
  </div>
</div>

<div id="name-modal" class="modal-backdrop"
  <div class="modal-card">
    <div class="modal-title">เริ่มต้นใช้งาน</div>
    <label class="field-label">ชื่อของคุณ</label>
    <input id="input-name" class="field-input" placeholder="เช่น พิชญา" maxlength="40">
    <label class="field-label" style="margin-top:14px">บทบาท (สำหรับทดลองระบบ)</label>
    <select id="input-role" class="field-input">
      <option value="assistant">ผู้ช่วยแพทย์ · Assistant</option>
      <option value="admin">ผู้ดูแล · Admin</option>
      <option value="super_admin">ผู้ดูแลสูงสุด · Super Admin</option>
    </select>
    <div class="modal-actions">
      <button id="btn-cancel-name" class="btn btn-ghost">ยกเลิก</button>
      <button id="btn-confirm-name" class="btn btn-primary">เริ่มใช้งาน</button>
    </div>
  </div>
</div>

<div id="app" class="app hidden">
  <header class="topbar">
    <button id="btn-hamburger" class="hamburger-btn" aria-label="เปิดเมนู">
      <span></span><span></span><span></span>
    </button>
    <nav class="topnav" id="topnav"></nav>
    <button id="btn-profile" class="profile-chip"></button>
  </header>

  <main id="view-root" class="view-root"></main>

  <button id="btn-fab" class="fab" aria-label="เพิ่มรายการวันนี้">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg>
  </button>

  <nav class="bottomnav" id="bottomnav"></nav>
</div>

<div id="drawer-backdrop" class="drawer-backdrop"></div>
<aside id="drawer" class="drawer" aria-hidden="true">
  <div class="drawer-header">
    <div class="drawer-profile" id="drawer-profile"></div>
    <button id="btn-drawer-close" class="drawer-close-btn" aria-label="ปิดเมนู">✕</button>
  </div>
  <nav class="drawer-nav" id="drawer-nav"></nav>
  <div class="drawer-footer">
    <button id="btn-drawer-logout" class="btn btn-ghost btn-block">ออกจากระบบ</button>
  </div>
</aside>

<div id="toast" class="toast"></div>

<!-- Loading overlay -->
<div id="loader" class="modal-backdrop hidden loader-container" style="background:rgba(58,44,40,0.85);z-index:9999;color:#F5EBE6;font-size:15px;font-weight:500;">
  <div class="loader-spinner"></div>
  <span>กำลังโหลดข้อมูล...</span>
</div>

<!-- Firebase SDK (Compat Version) -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<!-- App configurations and scripts -->
<script src="data/config.js"></script>
<script src="data/catalog.js"></script>
<script src="data/store.js"></script>
<script src="data/calc.js"></script>
<script src="views.js"></script>
<script src="app.js"></script>
</body>
</html>
